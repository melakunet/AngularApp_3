<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0 rounded-4 p-4">
        <h3 class="mb-4 fw-bold text-center">Register</h3>

        <form #f="ngForm" (ngSubmit)="register(f)">

          <div class="form-group mb-3">
            <label>Username</label>
            <input type="text" name="userName" class="form-control"
                   [(ngModel)]="userName" required placeholder="Choose a username">
          </div>

          <div class="form-group mb-3">
            <label>Email Address</label>
            <input type="email" name="emailAddress" class="form-control"
                   [(ngModel)]="emailAddress" required placeholder="Enter your email">
          </div>

          <div class="form-group mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control"
                   [(ngModel)]="password" required placeholder="Choose a password">
          </div>

          <div class="form-group mb-3">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" class="form-control"
                   [(ngModel)]="confirmPassword" required placeholder="Repeat your password">
          </div>

          <button type="submit" class="btn btn-success w-100" [disabled]="f.invalid">Register</button>

          <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
          <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>

        </form>

        <p class="text-center mt-3 text-muted">
          Already have an account? <a routerLink="/login">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
